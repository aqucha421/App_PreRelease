name: AutoLedger
options:
  bundleIdPrefix: com.autoledger
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
targets:
  AutoLedger:
    type: application
    platform: iOS
    sources:
      - path: ios
        excludes:
          - "**/*.md"
          - "README.md"
    resources:
      - path: ios/Config/PrivacyInfo.xcprivacy
    info:
      path: ios/Config/Info.plist
      properties:
        CFBundleDisplayName: Auto Ledger
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.autoledger.app
        SWIFT_OBJC_BRIDGING_HEADER: ios/Config/AutoLedger-Bridging-Header.h
        INFOPLIST_FILE: ios/Config/Info.plist
    scheme:
      testTargets:
        - AutoLedgerTests
  AutoLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ios-tests
    dependencies:
      - target: AutoLedger
