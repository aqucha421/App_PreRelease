<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto Ledger iPhone Debugger</title>
    <link rel="stylesheet" href="./debug-iphone.css" />
  </head>
  <body>
    <main class="debug-shell">
      <section class="simulator">
        <div class="device-toolbar">
          <div>
            <p>iPhone virtual debugger</p>
            <h1>Auto Ledger</h1>
          </div>
          <select id="devicePreset">
            <option value="393x852">iPhone 15</option>
            <option value="390x844">iPhone 14</option>
            <option value="375x812">iPhone 13 mini</option>
            <option value="430x932">iPhone 15 Pro Max</option>
          </select>
        </div>

        <div class="iphone-frame" id="iphoneFrame">
          <div class="speaker"></div>
          <iframe id="appFrame" title="Auto Ledger app preview" src="./index.html?debug=1&v=20260607-debug"></iframe>
        </div>
      </section>

      <aside class="debug-panel">
        <section class="panel">
          <h2>App URL</h2>
          <label>
            Base URL
          <input id="baseUrl" value="./index.html?debug=1&v=20260607-debug" />
          </label>
          <div class="actions">
            <button id="reloadButton">Reload</button>
            <button id="openFullButton">Open full page</button>
          </div>
        </section>

        <section class="panel">
          <h2>Wallet shortcut event</h2>
          <div class="grid">
            <label>
              Provider
              <select id="provider">
                <option>QUICPay</option>
                <option>iD</option>
                <option>Suica</option>
                <option>PASMO</option>
                <option>PayPay</option>
              </select>
            </label>
            <label>
              Amount
              <input id="amount" type="number" value="680" min="1" />
            </label>
          </div>
          <label>
            Merchant
            <input id="merchant" value="コンビニ 渋谷三丁目" />
          </label>
          <label>
            Source
            <select id="source">
              <option value="wallet">wallet</option>
              <option value="qr">qr</option>
            </select>
          </label>
          <div class="actions">
            <button id="sendEventButton">Send to iPhone</button>
            <button id="copyUrlButton">Copy URL</button>
          </div>
          <textarea id="eventUrl" readonly></textarea>
        </section>

        <section class="panel">
          <h2>Scenarios</h2>
          <div class="scenario-list">
            <button data-scenario="convenience">QUICPay convenience</button>
            <button data-scenario="train">Suica train</button>
            <button data-scenario="qr">PayPay QR</button>
            <button data-scenario="unknown">Unknown merchant</button>
            <button data-scenario="rakutenpay">Rakuten Pay</button>
            <button data-scenario="dbarai">d払い</button>
            <button data-scenario="aupay">au PAY</button>
            <button data-scenario="merpay">メルペイ</button>
          </div>
        </section>

        <section class="panel">
          <h2>Debug log</h2>
          <ol id="debugLog"></ol>
        </section>
      </aside>
    </main>

    <script src="./debug-iphone.js?v=20260607-debug"></script>
  </body>
</html>
